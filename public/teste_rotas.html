<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Testar Rotas API</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        h2 {
            margin-top: 40px;
        }

        input,
        textarea {
            width: 300px;
            margin: 5px 0;
        }

        button {
            margin-top: 10px;
            display: block;
        }

        pre {
            background: #eee;
            padding: 10px;
        }
    </style>
</head>

<body>

    <h1>Testes da API (PHP + REST)</h1>

    <hr>

    <h2>1. Listar Posts (GET /posts)</h2>
    <button onclick="listarPosts()">Listar Posts</button>
    <pre id="saida1"></pre>

    <script>
        function listarPosts() {
            fetch("http://localhost/api/posts")
                .then(r => r.json())
                .then(data => document.getElementById("saida1").textContent = JSON.stringify(data, null, 2));
        }
    </script>

    <hr>

    <h2>2. Criar Post (POST /posts)</h2>

    <form id="formPost">
        <input type="text" name="titulo" placeholder="Título"><br>
        <textarea name="conteudo" placeholder="Conteúdo"></textarea><br>
        <button type="submit">Enviar</button>
    </form>
    <pre id="saida2"></pre>

    <script>
        document.getElementById("formPost").onsubmit = function (e) {
            e.preventDefault();

            let form = new FormData(e.target);

            fetch("http://localhost/api/posts", {
                method: "POST",
                body: form
            })
                .then(r => r.text())
                .then(txt => document.getElementById("saida2").textContent = txt);
        };
    </script>

    <hr>

    <h2>3. Ver Post por ID (GET /posts/{id})</h2>

    <input type="number" id="buscarId" placeholder="ID do Post">
    <button onclick="buscarPost()">Buscar</button>
    <pre id="saida3"></pre>

    <script>
        function buscarPost() {
            let id = document.getElementById("buscarId").value;
            fetch(`http://localhost/api/posts/${id}`)
                .then(r => r.json())
                .then(data => document.getElementById("saida3").textContent = JSON.stringify(data, null, 2));
        }
    </script>

    <hr>

    <h2>4. Deletar Post (DELETE /posts/{id})</h2>

    <input type="number" id="delId" placeholder="ID do Post">
    <button onclick="deletarPost()">Deletar</button>
    <pre id="saida4"></pre>

    <script>
        function deletarPost() {
            let id = document.getElementById("delId").value;

            fetch(`http://localhost/api/posts/${id}`, {
                method: "DELETE"
            })
                .then(r => r.text())
                .then(txt => document.getElementById("saida4").textContent = txt);
        }
    </script>

</body>

</html>
