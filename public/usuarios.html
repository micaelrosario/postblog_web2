<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Usuários - BlogPost</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="bi bi-newspaper"></i> BlogPost Manager</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="posts.html">Posts</a></li>
                    <li class="nav-item"><a class="nav-link" href="categorias.html">Categorias</a></li>
                    <li class="nav-item"><a class="nav-link active" href="usuarios.html">Usuários</a></li>
                    <li class="nav-item"><a class="nav-link" href="comentarios.html">Comentários</a></li>
                    <li class="nav-item"><a class="nav-link" href="perfis.html">Perfis</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row">
            <div class="col-lg-8">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-warning text-dark">
                        <h4 class="mb-0"><i class="bi bi-people"></i> Lista de Usuários</h4>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Username</th>
                                        <th>Nome</th>
                                        <th>Email</th>
                                        <th>Data Criação</th>
                                        <th>Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="listaUsuarios">
                                    <tr><td colspan="6" class="text-center">Carregando...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-warning text-dark">
                        <h5 class="mb-0"><i class="bi bi-plus-circle"></i> <span id="formTitulo">Criar Usuário</span></h5>
                    </div>
                    <div class="card-body">
                        <form id="formUsuario">
                            <input type="hidden" id="usuarioId" name="id">
                            
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" class="form-control" id="username" name="username" required>
                            </div>

                            <div class="mb-3">
                                <label for="first_name" class="form-label">Nome</label>
                                <input type="text" class="form-control" id="first_name" name="first_name">
                            </div>

                            <div class="mb-3">
                                <label for="last_name" class="form-label">Sobrenome</label>
                                <input type="text" class="form-control" id="last_name" name="last_name">
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" class="form-control" id="email" name="email">
                            </div>

                            <div class="mb-3" id="senhaGroup">
                                <label for="senha" class="form-label">Senha</label>
                                <input type="password" class="form-control" id="senha" name="senha" required>
                                <small class="text-muted">Mínimo 6 caracteres</small>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-warning" id="btnSubmit">
                                    <i class="bi bi-check-circle"></i> Criar Usuário
                                </button>
                                <button type="button" class="btn btn-secondary" id="btnCancelar" style="display:none;" onclick="cancelarEdicao()">
                                    <i class="bi bi-x-circle"></i> Cancelar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast para notificações -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="toast" class="toast" role="alert">
            <div class="toast-header">
                <strong class="me-auto">Notificação</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="toastBody"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = './api/usuarios.php';
        let editando = false;

        // Listar usuários
        async function listarUsuarios() {
            try {
                const response = await fetch(API_URL);
                const usuarios = await response.json();
                
                const tbody = document.getElementById('listaUsuarios');
                tbody.innerHTML = '';

                if (usuarios.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center">Nenhum usuário encontrado</td></tr>';
                    return;
                }

                usuarios.forEach(user => {
                    const data = user.criado_em ? new Date(user.criado_em).toLocaleDateString('pt-BR') : 'N/A';
                    tbody.innerHTML += `
                        <tr>
                            <td>${user.id}</td>
                            <td><strong>${user.username}</strong></td>
                            <td>${user.first_name || ''} ${user.last_name || ''}</td>
                            <td>${user.email || 'N/A'}</td>
                            <td>${data}</td>
                            <td>
                                <button class="btn btn-sm btn-warning" onclick="editarUsuario(${user.id})">
                                    <i class="bi bi-pencil"></i>
                                </button>
                                <button class="btn btn-sm btn-danger" onclick="deletarUsuario(${user.id})">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                mostrarToast('Erro ao carregar usuários: ' + error.message, 'danger');
            }
        }

        // Criar ou atualizar usuário
        document.getElementById('formUsuario').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const id = document.getElementById('usuarioId').value;

            try {
                let response;
                if (editando && id) {
                    // PUT - Atualizar
                    const data = Object.fromEntries(formData);
                    const params = new URLSearchParams(data).toString();
                    response = await fetch(`${API_URL}?id=${id}`, {
                        method: 'PUT',
                        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                        body: params
                    });
                } else {
                    // POST - Criar
                    response = await fetch(API_URL, {
                        method: 'POST',
                        body: formData
                    });
                }

                const resultado = await response.json();
                mostrarToast(resultado.mensagem, resultado.sucesso ? 'success' : 'danger');
                
                if (resultado.sucesso) {
                    e.target.reset();
                    cancelarEdicao();
                    listarUsuarios();
                }
            } catch (error) {
                mostrarToast('Erro: ' + error.message, 'danger');
            }
        });

        // Editar usuário
        async function editarUsuario(id) {
            try {
                const response = await fetch(`${API_URL}?id=${id}`);
                const usuario = await response.json();

                document.getElementById('usuarioId').value = usuario.id;
                document.getElementById('username').value = usuario.username;
                document.getElementById('first_name').value = usuario.first_name || '';
                document.getElementById('last_name').value = usuario.last_name || '';
                document.getElementById('email').value = usuario.email || '';
                
                // Não exigir senha na edição
                document.getElementById('senha').required = false;
                document.getElementById('senhaGroup').querySelector('small').textContent = 'Deixe em branco para manter a senha atual';

                document.getElementById('formTitulo').textContent = 'Editar Usuário';
                document.getElementById('btnSubmit').innerHTML = '<i class="bi bi-save"></i> Atualizar';
                document.getElementById('btnCancelar').style.display = 'block';
                editando = true;
            } catch (error) {
                mostrarToast('Erro ao carregar usuário: ' + error.message, 'danger');
            }
        }

        // Deletar usuário
        async function deletarUsuario(id) {
            if (!confirm('Tem certeza que deseja deletar este usuário?')) return;

            try {
                const response = await fetch(`${API_URL}?id=${id}`, { method: 'DELETE' });
                const resultado = await response.json();
                
                mostrarToast(resultado.mensagem, resultado.sucesso ? 'success' : 'danger');
                if (resultado.sucesso) listarUsuarios();
            } catch (error) {
                mostrarToast('Erro ao deletar: ' + error.message, 'danger');
            }
        }

        // Cancelar edição
        function cancelarEdicao() {
            document.getElementById('formUsuario').reset();
            document.getElementById('usuarioId').value = '';
            document.getElementById('senha').required = true;
            document.getElementById('senhaGroup').querySelector('small').textContent = 'Mínimo 6 caracteres';
            document.getElementById('formTitulo').textContent = 'Criar Usuário';
            document.getElementById('btnSubmit').innerHTML = '<i class="bi bi-check-circle"></i> Criar Usuário';
            document.getElementById('btnCancelar').style.display = 'none';
            editando = false;
        }

        // Mostrar toast
        function mostrarToast(mensagem, tipo = 'info') {
            const toastEl = document.getElementById('toast');
            const toastBody = document.getElementById('toastBody');
            toastBody.textContent = mensagem;
            toastEl.className = `toast bg-${tipo} text-white`;
            const toast = new bootstrap.Toast(toastEl);
            toast.show();
        }

        // Inicializar
        listarUsuarios();
    </script>
</body>
</html>
