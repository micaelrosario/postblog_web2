<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Perfis de Autor - BlogPost</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="bi bi-newspaper"></i> BlogPost Manager</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="posts.html">Posts</a></li>
                    <li class="nav-item"><a class="nav-link" href="categorias.html">Categorias</a></li>
                    <li class="nav-item"><a class="nav-link" href="usuarios.html">Usuários</a></li>
                    <li class="nav-item"><a class="nav-link" href="comentarios.html">Comentários</a></li>
                    <li class="nav-item"><a class="nav-link active" href="perfis.html">Perfis</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row">
            <div class="col-lg-8">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-danger text-white">
                        <h4 class="mb-0"><i class="bi bi-person-badge"></i> Lista de Perfis de Autor</h4>
                    </div>
                    <div class="card-body">
                        <div class="row" id="listaPerfis">
                            <div class="col-12 text-center">Carregando...</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-danger text-white">
                        <h5 class="mb-0"><i class="bi bi-plus-circle"></i> <span id="formTitulo">Criar Perfil</span></h5>
                    </div>
                    <div class="card-body">
                        <form id="formPerfil">
                            <input type="hidden" id="perfilId" name="id">
                            
                            <div class="mb-3">
                                <label for="usuario_id" class="form-label">Usuário</label>
                                <select class="form-select" id="usuario_id" name="usuario_id" required>
                                    <option value="">Selecione um usuário...</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="bio" class="form-label">Biografia</label>
                                <textarea class="form-control" id="bio" name="bio" rows="3" placeholder="Breve descrição do autor..."></textarea>
                            </div>

                            <div class="mb-3">
                                <label for="foto" class="form-label">URL da Foto</label>
                                <input type="text" class="form-control" id="foto" name="foto" placeholder="https://exemplo.com/foto.jpg">
                            </div>

                            <div class="mb-3">
                                <label for="redes_sociais" class="form-label">Redes Sociais (JSON)</label>
                                <textarea class="form-control" id="redes_sociais" name="redes_sociais" rows="3" placeholder='{"twitter": "@usuario", "linkedin": "usuario"}'></textarea>
                                <small class="text-muted">Formato JSON</small>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-danger" id="btnSubmit">
                                    <i class="bi bi-check-circle"></i> Criar Perfil
                                </button>
                                <button type="button" class="btn btn-secondary" id="btnCancelar" style="display:none;" onclick="cancelarEdicao()">
                                    <i class="bi bi-x-circle"></i> Cancelar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast para notificações -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="toast" class="toast" role="alert">
            <div class="toast-header">
                <strong class="me-auto">Notificação</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="toastBody"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = './api/perfil_autor.php';
        let editando = false;

        // Carregar usuários no select
        async function carregarUsuarios() {
            const usuarios = await fetch('./api/usuarios.php').then(r => r.json());
            const selectUsuario = document.getElementById('usuario_id');

            usuarios.forEach(u => {
                selectUsuario.innerHTML += `<option value="${u.id}">${u.username || u.first_name || 'Usuário #' + u.id}</option>`;
            });
        }

        // Listar perfis
        async function listarPerfis() {
            try {
                const response = await fetch(API_URL);
                const perfis = await response.json();
                
                const container = document.getElementById('listaPerfis');
                container.innerHTML = '';

                if (perfis.length === 0) {
                    container.innerHTML = '<div class="col-12 text-center">Nenhum perfil encontrado</div>';
                    return;
                }

                perfis.forEach(perfil => {
                    const foto = perfil.foto || 'https://via.placeholder.com/100';
                    const bio = perfil.bio || 'Sem biografia';
                    
                    container.innerHTML += `
                        <div class="col-md-6 mb-3">
                            <div class="card">
                                <div class="card-body">
                                    <div class="d-flex align-items-center">
                                        <img src="${foto}" class="rounded-circle me-3" width="60" height="60" alt="Foto">
                                        <div class="flex-grow-1">
                                            <h6 class="mb-1">Perfil #${perfil.id}</h6>
                                            <small class="text-muted">Usuário: ${perfil.usuario_id}</small>
                                            <p class="mb-0 small">${bio}</p>
                                        </div>
                                    </div>
                                    <div class="mt-2">
                                        <button class="btn btn-sm btn-warning" onclick="editarPerfil(${perfil.id})">
                                            <i class="bi bi-pencil"></i> Editar
                                        </button>
                                        <button class="btn btn-sm btn-danger" onclick="deletarPerfil(${perfil.id})">
                                            <i class="bi bi-trash"></i> Deletar
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                mostrarToast('Erro ao carregar perfis: ' + error.message, 'danger');
            }
        }

        // Criar ou atualizar perfil
        document.getElementById('formPerfil').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const id = document.getElementById('perfilId').value;

            try {
                let response;
                if (editando && id) {
                    // PUT - Atualizar
                    const data = Object.fromEntries(formData);
                    const params = new URLSearchParams(data).toString();
                    response = await fetch(`${API_URL}?id=${id}`, {
                        method: 'PUT',
                        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                        body: params
                    });
                } else {
                    // POST - Criar
                    response = await fetch(API_URL, {
                        method: 'POST',
                        body: formData
                    });
                }

                const resultado = await response.json();
                mostrarToast(resultado.mensagem, resultado.sucesso ? 'success' : 'danger');
                
                if (resultado.sucesso) {
                    e.target.reset();
                    cancelarEdicao();
                    listarPerfis();
                }
            } catch (error) {
                mostrarToast('Erro: ' + error.message, 'danger');
            }
        });

        // Editar perfil
        async function editarPerfil(id) {
            try {
                const response = await fetch(`${API_URL}?id=${id}`);
                const perfil = await response.json();

                document.getElementById('perfilId').value = perfil.id;
                document.getElementById('usuario_id').value = perfil.usuario_id;
                document.getElementById('bio').value = perfil.bio || '';
                document.getElementById('foto').value = perfil.foto || '';
                document.getElementById('redes_sociais').value = perfil.redes_sociais || '';

                document.getElementById('formTitulo').textContent = 'Editar Perfil';
                document.getElementById('btnSubmit').innerHTML = '<i class="bi bi-save"></i> Atualizar';
                document.getElementById('btnCancelar').style.display = 'block';
                editando = true;
            } catch (error) {
                mostrarToast('Erro ao carregar perfil: ' + error.message, 'danger');
            }
        }

        // Deletar perfil
        async function deletarPerfil(id) {
            if (!confirm('Tem certeza que deseja deletar este perfil?')) return;

            try {
                const response = await fetch(`${API_URL}?id=${id}`, { method: 'DELETE' });
                const resultado = await response.json();
                
                mostrarToast(resultado.mensagem, resultado.sucesso ? 'success' : 'danger');
                if (resultado.sucesso) listarPerfis();
            } catch (error) {
                mostrarToast('Erro ao deletar: ' + error.message, 'danger');
            }
        }

        // Cancelar edição
        function cancelarEdicao() {
            document.getElementById('formPerfil').reset();
            document.getElementById('perfilId').value = '';
            document.getElementById('formTitulo').textContent = 'Criar Perfil';
            document.getElementById('btnSubmit').innerHTML = '<i class="bi bi-check-circle"></i> Criar Perfil';
            document.getElementById('btnCancelar').style.display = 'none';
            editando = false;
        }

        // Mostrar toast
        function mostrarToast(mensagem, tipo = 'info') {
            const toastEl = document.getElementById('toast');
            const toastBody = document.getElementById('toastBody');
            toastBody.textContent = mensagem;
            toastEl.className = `toast bg-${tipo} text-white`;
            const toast = new bootstrap.Toast(toastEl);
            toast.show();
        }

        // Inicializar
        carregarUsuarios();
        listarPerfis();
    </script>
</body>
</html>
